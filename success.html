<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're In — Northern Automation</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Canonical -->
  <link rel="canonical" href="https://northernautomation.ca/success">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: rgba(37, 99, 235, 0.15);
      border: 2px solid rgba(37, 99, 235, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      font-size: 1.75rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    h1 span {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .message {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 0.75rem;
    }

    .trial-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.35);
      color: #34d399;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin: 1.25rem 0 2rem;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      padding: 0.8rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .btn:hover { background: #1d4ed8; }

    .footer-note {
      margin-top: 1.75rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
    <script defer data-domain="northernautomation.ca" src="https://analytics.northernautomation.ca/js/script.outbound-links.404.custom-events.js"></script>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>You're <span>In!</span></h1>
    <p class="message">Check your email for next steps.<br>Your 14-day free trial has started.</p>
    <div class="trial-badge">14-day free trial active</div>
    <a href="https://northernautomation.ca" class="btn">Back to northernautomation.ca</a>
    <p class="footer-note">Questions? Email us at hello@northernautomation.ca</p>
  </div>
</body>
</html>
